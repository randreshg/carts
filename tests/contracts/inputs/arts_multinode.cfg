[ARTS]
# Two-node local config used by step-boundary contract tests.
worker_threads=8

# Keep network threads disabled for local launcher tests.
sender_threads=0
receiver_threads=0
port_count=1

launcher=local
master_node=localhost
node_count=2
nodes=localhost,localhost
default_ports=34739,34740

worker_init_deque_size=2048
route_table_size=16

core_dump=1
counter_folder=./counters
