[ARTS]
# GPU-enabled ARTS configuration for GPU examples
# Uses scheduler=3 for GPU scheduling

# Threading (minimal for GPU offload)
threads=1
tMT=0

# Network configuration
outgoing=1
incoming=1
ports=1

# Launcher configuration
launcher=ssh
masterNode=localhost
nodeCount=1
nodes=localhost

# GPU Configuration
scheduler=3
gpu=4
gpuRouteTableSize=12
gpuLocality=0
gpuFit=0
gpuLCSync=0
gpuBufferOn=true
gpuMaxMemory=-1
gpuMaxEdts=-1
gpuMinIterations=256
gpuMinDataBytes=1024

# Performance monitoring
counterFolder=./counters/
counterStartPoint=1
