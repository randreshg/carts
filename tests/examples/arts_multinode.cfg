[ARTS]
################################################################################
#                    ARTS Multi-Node Configuration File
#
# Local multi-node simulation for testing distributed CARTS features.
# Launches 2 processes on localhost connected via TCP loopback.
#
# Usage:
#   dekk carts compile program.c -O3 --distributed-db -o program
#   ARTS_CONFIG=tests/examples/arts_multinode.cfg ./program
################################################################################

#===============================================================================
# THREADING
#===============================================================================

# Reduced worker threads — 2 processes share the same machine
worker_threads=4

#===============================================================================
# HARDWARE PINNING
#===============================================================================

# Disable pinning — both processes share the same cores
pin=0

#===============================================================================
# SCHEDULING
#===============================================================================

worker_init_deque_size=2048
route_table_size=16

#===============================================================================
# NETWORKING
#===============================================================================

sender_threads=1
receiver_threads=1
port_count=1

#===============================================================================
# LAUNCHER
#===============================================================================

launcher=local
master_node=localhost
node_count=2
nodes=localhost:50000,localhost:50001
default_ports=50000

#===============================================================================
# DEBUG / UTILITY
#===============================================================================

core_dump=1
kill_mode=0
