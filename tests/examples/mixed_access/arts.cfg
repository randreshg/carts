[ARTS]
# Mixed Access Pattern Test Configuration
# Tests DbCopy/DbSync for chunked write + fine-grained read patterns
threads = 4

# Temporal Multi-threading
tMT=0

# Network threads
outgoing=1
incoming=1
ports=1

# Hardware pinning
pinStride=1
printTopology=0

# Deque default start size
workerInitDequeSize=2048

# Routing table default start size
routeTableSize=16

# Enable core dumps
coreDump=1

# Launching method
launcher=ssh

# For ssh only
masterNode=arts-node-1

# Number of nodes
nodeCount=6

# Which nodes to run on
nodes=arts-node-1,arts-node-2,arts-node-3,arts-node-4,arts-node-5,arts-node-6

# Protocol
protocol=tcp
port=34739

# Kills previous runs
killMode=0
