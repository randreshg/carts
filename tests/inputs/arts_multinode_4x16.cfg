[ARTS]
# Four-node local config with 16 workers per node. This keeps the total
# runtime-visible worker count at 64 while exercising distributed costs.
worker_threads=16

sender_threads=0
receiver_threads=0
port_count=1

launcher=local
master_node=localhost
node_count=4
nodes=localhost,localhost,localhost,localhost
default_ports=34739,34740,34741,34742

worker_init_deque_size=2048
route_table_size=16

core_dump=1
counter_folder=./counters
