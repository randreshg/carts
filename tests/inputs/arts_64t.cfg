[ARTS]
# Contract config for high-thread single-node lowering checks.
worker_threads=64

# Network configuration
sender_threads=0
receiver_threads=0
port_count=1

# Launcher configuration
launcher=local
master_node=localhost
node_count=1
nodes=localhost
default_ports=34739

# Scheduling
worker_init_deque_size=2048
route_table_size=16

# Debug
core_dump=1
counter_folder=./counters
