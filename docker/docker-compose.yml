volumes:
  carts-workspace:
    driver: local

services:
  arts-node-1:
    image: arts-node:built
    hostname: arts-node-1
    container_name: arts-node-1
    environment:
      - ARTS_NODE_ID=0
      - SLURM_PROCID=0
      - SLURM_NNODES=6
      - SLURM_STEP_NODELIST=arts-node-[1-6]
      - SLURM_CPUS_PER_TASK=4
    volumes:
      - carts-workspace:/opt/carts
    command: ["/usr/sbin/sshd", "-D"]

  arts-node-2:
    image: arts-node:built
