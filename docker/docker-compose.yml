volumes:
  carts-workspace:
    driver: local

services:
  arts-node-1:
    image: arts-node:built
    hostname: arts-node-1
    container_name: arts-node-1
    environment:
      - ARTS_NODE_ID=0
    volumes:
      - carts-workspace:/opt/carts
    command: ["/usr/sbin/sshd", "-D"]

  arts-node-2:
    image: arts-node:built
    hostname: arts-node-2
    container_name: arts-node-2
    environment:
      - ARTS_NODE_ID=1
    volumes:
      - carts-workspace:/opt/carts
    command: ["/usr/sbin/sshd", "-D"]

  arts-node-3:
    image: arts-node:built
    hostname: arts-node-3
    container_name: arts-node-3
    environment:
      - ARTS_NODE_ID=2
    volumes:
      - carts-workspace:/opt/carts
    command: ["/usr/sbin/sshd", "-D"]

  arts-node-4:
    image: arts-node:built
    hostname: arts-node-4
    container_name: arts-node-4
    environment:
      - ARTS_NODE_ID=3
    volumes:
      - carts-workspace:/opt/carts
    command: ["/usr/sbin/sshd", "-D"]

  arts-node-5:
    image: arts-node:built
    hostname: arts-node-5
    container_name: arts-node-5
    environment:
      - ARTS_NODE_ID=4
    volumes:
      - carts-workspace:/opt/carts
    command: ["/usr/sbin/sshd", "-D"]

  arts-node-6:
    image: arts-node:built
    hostname: arts-node-6
    container_name: arts-node-6
    environment:
      - ARTS_NODE_ID=5
    volumes:
      - carts-workspace:/opt/carts
    command: ["/usr/sbin/sshd", "-D"]
