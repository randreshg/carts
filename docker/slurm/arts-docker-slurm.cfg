[ARTS]
# This is the config File for ARTS Docker Multi-Node Setup (Slurm launcher)
# ARTS reads node info from Slurm environment variables (SLURM_PROCID, etc.)
threads = 4

#Temporal Multi-threading
#Turn to the number of desired threads per worker (max is 64)
tMT=0

#Network threads
outgoing=1
incoming=1
ports=1

#Hardware pinning
pinStride=1
printTopology=0

#Deque default start size
workerInitDequeSize=2048

#Routing table default start size
routeTableSize=16

#Enable core dumps
coreDump=1

# Launching method: slurm (reads from SLURM_* env vars)
launcher=slurm

# Number of nodes
nodeCount=6

# Protocol (tcp, ib) -> (ib) Native Ib to added in the future
protocol=tcp
port=34739

#Counters
counterFolder=./counters

#Useful if using ssh launcher
#Kills previous runs on a system
killMode=0
