# Slurm configuration for CARTS Docker cluster
# 6-node simulated cluster using Docker containers

ClusterName=carts-docker
SlurmctldHost=arts-node-1
SlurmUser=root
SlurmdUser=root

# Process tracking (works in Docker without --privileged)
ProctrackType=proctrack/linuxproc

# Authentication (munge key baked into image = same on all nodes)
AuthType=auth/munge

# Scheduling
SchedulerType=sched/builtin
SelectType=select/cons_tres
SelectTypeParameters=CR_CPU

# Logging
SlurmctldLogFile=/var/log/slurm/slurmctld.log
SlurmdLogFile=/var/log/slurm/slurmd.log
SlurmctldDebug=info
SlurmdDebug=info

# State and spool directories
StateSaveLocation=/var/spool/slurmctld
SlurmdSpoolDir=/var/spool/slurmd
SlurmdPidFile=/run/slurmd.pid
SlurmctldPidFile=/run/slurmctld.pid

# Accounting (enables sacct for benchmark pipeline)
AccountingStorageType=accounting_storage/filetxt
AccountingStorageLoc=/var/log/slurm/accounting.log

# Nodes auto-rejoin after container restarts
ReturnToService=2

# Timeouts (relaxed for Docker environment)
SlurmctldTimeout=120
SlurmdTimeout=120
InactiveLimit=0
MinJobAge=300
KillWait=30
Waittime=0

# Node definitions (match Docker container hostnames)
NodeName=arts-node-[1-6] CPUs=4 State=UNKNOWN

# Partition definition
PartitionName=docker Nodes=arts-node-[1-6] Default=YES MaxTime=INFINITE State=UP
