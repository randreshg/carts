[ARTS]
# 2-node Docker config for testing (2 nodes x 4 threads = 8 workers)
worker_threads=4
sender_threads=1
receiver_threads=1
port_count=1
pin=1
worker_init_deque_size=2048
route_table_size=16
core_dump=1
launcher=slurm
node_count=2
protocol=tcp
default_ports=34739
counter_folder=./counters
counter_capture_interval=100
kill_mode=0
