# CARTS environment configuration
#
# Canonical project lifecycle entrypoints:
#   python -m pip install --upgrade dekk
#   dekk carts install
#   dekk carts agents generate
#   dekk carts build
#   dekk carts worktree list
#
# Daily compiler usage should go through `dekk carts ...`, or through the
# optional project-local `./.install/carts` wrapper generated by
# `dekk carts install --wrap`.

[project]
name = "carts"
description = "Compiler for Asynchronous Runtime Systems"

[environment]
type = "conda"
path = "{project}/.dekk/env"
file = "environment.yml"
name = "carts"

[agents]
source = "carts-plugin"
targets = ["claude", "codex", "copilot", "cursor"]
enrich = true
version = "0.1.0"

[tools]
conda       = { command = "conda" }
cmake       = { command = "cmake",        version = ">=3.20" }
ninja       = { command = "ninja" }
make        = { command = "make" }
git         = { command = "git" }
clang       = { command = "clang",        version = ">=18" }
"clang++"   = { command = "clang++",      version = ">=18" }
python      = { command = "python",       version = ">=3.11" }
gcc         = { command = "gcc",          optional = true }
clang-format = { command = "clang-format", optional = true }
lit         = { command = "lit",          optional = true }

[commands]
doctor = { run = "python tools/carts_cli.py doctor", description = "Validate the CARTS toolchain and environment", group = "Environment" }
env = { run = "python tools/carts_cli.py env", description = "Show the active CARTS environment", group = "Environment" }
version = { run = "python tools/carts_cli.py version", description = "Show the CARTS CLI version", group = "Environment" }
build = { run = "python tools/carts_cli.py build", description = "Build CARTS and related components", skill = true, group = "Build & Test" }
compile = { run = "python tools/carts_cli.py compile", description = "Run the CARTS compilation pipeline", skill = true, group = "Compilation" }
pipeline = { run = "python tools/carts_cli.py pipeline", description = "Inspect compiler pipeline stages", skill = true, group = "Compilation" }
cgeist = { run = "python tools/carts_cli.py cgeist", description = "Run the Polygeist cgeist frontend", group = "Compilation" }
clang = { run = "python tools/carts_cli.py clang", description = "Run the CARTS-managed clang frontend", group = "Compilation" }
mlir-translate = { run = "python tools/carts_cli.py mlir-translate", description = "Run MLIR translation helpers", group = "Compilation" }
triage-benchmark = { run = "python tools/carts_cli.py triage-benchmark", description = "Run the benchmark triage workflow", skill = true, group = "Benchmarking" }
test = { run = "python tools/carts_cli.py test", description = "Run the CARTS test suite", skill = true, group = "Build & Test" }
lit = { run = "python tools/carts_cli.py lit", description = "Run focused lit regressions", group = "Build & Test" }
format = { run = "python tools/carts_cli.py format", description = "Format tracked source files", group = "Development" }
clean = { run = "python tools/carts_cli.py clean", description = "Clean generated files and build outputs", group = "Development" }
update = { run = "python tools/carts_cli.py update", description = "Update CARTS and pinned submodules", group = "Development" }
benchmarks = { run = "python tools/carts_cli.py benchmarks", description = "Build and run benchmark workloads", skill = true, group = "Benchmarking" }
examples = { run = "python tools/carts_cli.py examples", description = "List or run bundled examples", group = "Development" }
docker = { run = "python tools/carts_cli.py docker", description = "Manage Docker-based CARTS workflows", group = "Docker" }

[install]
build = "python tools/install_driver.py"
wrap = { name = "carts", target = "tools/carts_cli.py" }

[env]
CARTS_DIR = "{project}"
LLVM_SYMBOLIZER_PATH = "{project}/.install/llvm/bin/llvm-symbolizer"

[paths]
bin = [
    "{project}/.install",
    "{project}/.install/bin",
    "{project}/.install/carts/bin",
    "{project}/.install/llvm/bin",
    "{project}/.install/arts/bin",
    "{project}/.install/polygeist/bin",
]

# Wire the managed conda env's lib/ into the dynamic-linker search path
DYLD_LIBRARY_PATH = ["{project}/.dekk/env/lib"]
LD_LIBRARY_PATH   = ["{project}/.dekk/env/lib"]
